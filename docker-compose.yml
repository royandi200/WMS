version: '3.9'

services:
  # ── Base de datos MySQL ─────────────────────────────────
  db:
    image: mysql:8.0
    container_name: wms_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wms_db
      MYSQL_USER: wms_user
      MYSQL_PASSWORD: wms_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - wms_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: wms_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - '4000:4000'
    volumes:
      - ./backend/src:/app/src
    networks:
      - wms_network

  # ── Frontend React ──────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: wms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    networks:
      - wms_network

volumes:
  mysql_data:

networks:
  wms_network:
    driver: bridge
